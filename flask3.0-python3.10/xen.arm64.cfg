name    = "flask3.0-python3.10"
vcpus   = "1"
memory  = "512"
type    = "pv"

kernel  = "./workdir/build/flask3.0-python3.10_xen-arm64"
ramdisk = "./initrd.cpio"


cmdline = "rootfstype=ramfs console=ttyAMA0 \
  vfs.fstab=[\"initrd0:/:extract::ramfs=1\"] \
  env.vars=[PYTHONHOME=\"/usr/local/lib/python3.10\" \
            PYTHONPATH=\"/usr/local/lib/python3.10:/usr/local/lib/python3.10/site-packages\"] \
  -- /app/server.py"
