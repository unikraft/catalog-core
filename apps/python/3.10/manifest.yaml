catalog:
  schema-version: "0.4"

name: "python"
version: "3.10"
description: "Python 3.10 interpreter application for Unikraft."
keywords:
  - "language"
  - "interpreter"
  - "python"
  - "scripting"

unikraft:
  version: "stable"
  kconfig:
    - "CONFIG_LIBPYTHON3=y"

libraries:
  musl:
    version: "stable"
  pthread-embedded:
    version: "stable"
  lwip:
    version: "stable"

targets:
  - architecture: x86_64
    platform: kvm
  - architecture: x86_64
    platform: linuxu
