name          = "python3.12-http-server"
vcpus         = "1"
kernel        = "./workdir/build/python3.12-http-server_xen-arm64"
ramdisk       = "./initrd.cpio"
cmdline       = "python3.12-http-server vfs.fstab=[ \"initrd0:/:extract::ramfs=1:\" ] env.vars=[ PYTHONPATH=\"/usr/local/lib/python3.10:/usr/local/lib/python3.10/site-packages\" ] -- /app/http-server.py"
memory        = "256" 
type          = "pv"
